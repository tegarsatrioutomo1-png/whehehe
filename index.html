<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Muti 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h2>🎂 Selamat Ulang Tahun 💖</h2>
    <p class="subtitle">Aku punya sesuatu buat kamu... tapi masuk dulu ya 💌</p>

    <input type="password" id="password" placeholder="Masukin tanggal spesial kita...">

    <button class="btn-masuk" onclick="checkPassword()">Masuk 💕</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

    <audio id="music" loop>
        <source src="lagu.mp3">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()">🎵</button>

    <div class="effects"></div>

    <div class="gif-bg">
        <img id="photo" src="gif1.webp">
    </div>

    <div class="text-overlay">
        <h1 id="text"></h1>
        <div>
            <button onclick="vibrate(); prevPage()">⏪ Back</button>
            <button onclick="vibrate(); nextPage()">Next ⏩</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
